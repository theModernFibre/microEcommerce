server:
  port: ${PORT:8084}

spring:
  application:
    name: inventory-service
  datasource:
    url: jdbc:h2:mem:inventorydb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop

eureka:
  client:
    service-url:
      defaultZone: http://${DISCOVERY_HOSTPORT:localhost:8761}/eureka/
  instance:
    prefer-ip-address: true
