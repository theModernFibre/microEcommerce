server:
  port: ${PORT:8081}

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false

eureka:
  client:
    service-url:
      defaultZone: http://${DISCOVERY_HOSTPORT:localhost:8761}/eureka/
  instance:
    prefer-ip-address: true

jwt:
  secret: MicroShopSecretKeyForJWTTokenGenerationThatIsLongEnough
  expiration-ms: 86400000
